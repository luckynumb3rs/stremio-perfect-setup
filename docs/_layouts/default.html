<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <link rel="icon" href="{{ '/assets/images/sps-logo.svg' | relative_url }}" type="image/svg+xml">
  <link rel="shortcut icon" href="{{ '/assets/images/sps-logo.svg' | relative_url }}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ '/assets/images/sps-logo.svg' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
  {% include ga.html %}
</head>
<body>
  <header class="topbar">
    <button class="icon-btn" id="nav-toggle" aria-label="Open navigation" aria-controls="sidebar" aria-expanded="false">☰</button>
    <a class="topbar-brand" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/images/sps-logo.svg' | relative_url }}" alt="Stremio logo" class="topbar-logo">
      <span class="topbar-brand-text">
        <span class="topbar-title">Stremio/Nuvio Perfect Setup</span>
        <span class="topbar-subtitle">Full and Easy Total Beginner's Guide</span>
      </span>
    </a>
    <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme" aria-pressed="false">◐</button>
  </header>

  <button class="nav-backdrop" id="nav-backdrop" aria-hidden="true"></button>

  <aside class="sidebar" id="sidebar" aria-label="Guide navigation">
    <div class="sidebar__inner">
      <nav id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-support-links">
          <a
            class="sidebar-support-link sidebar-support-link--github"
            href="https://github.com/luckynumb3rs/stremio-perfect-setup"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="View GitHub repository"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path fill="currentColor" d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.38 7.86 10.9.58.11.79-.25.79-.56v-2.17c-3.2.7-3.88-1.36-3.88-1.36-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.69.08-.69 1.15.08 1.75 1.18 1.75 1.18 1.02 1.75 2.67 1.24 3.32.95.1-.74.4-1.24.72-1.53-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.27 1.17-3.08-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.14 1.18a10.9 10.9 0 0 1 5.72 0c2.18-1.49 3.14-1.18 3.14-1.18.62 1.58.23 2.75.11 3.04.73.81 1.17 1.83 1.17 3.08 0 4.41-2.68 5.39-5.24 5.67.41.35.78 1.04.78 2.1v3.12c0 .31.21.68.8.56A11.51 11.51 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/>
            </svg>
          </a>
          <a
            class="sidebar-support-link sidebar-support-link--kofi"
            href="https://ko-fi.com/luckynumb3rs"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Support on Ko-fi"
          >
            <img src="{{ '/images/kofi.png' | relative_url }}" alt="Ko-fi tipping button">
          </a>
        </div>
        <section class="sidebar-stat-card" aria-label="Guide completion count">
          <span class="sidebar-stat-card__eyebrow">Guide completed by</span>
          <strong class="sidebar-stat-card__value"><span data-guide-completion-count>0</span></strong>
          <span class="sidebar-stat-card__suffix">readers</span>
        </section>
      </div>
    </div>
  </aside>

  <div class="layout">
    <main class="content" id="main-content">
      <article class="doc-card fade-in">
        {{ content }}
        <section class="quick-nav" id="quick-nav" hidden>
          <details id="quick-nav-details">
            <summary>Quick Navigation</summary>
            <ul id="quick-nav-list"></ul>
          </details>
        </section>
        <nav class="pager" id="pager" aria-label="Page navigation" hidden></nav>
      </article>
    </main>
  </div>

  <script id="docs-data" type="application/json">
    {
      "homeUrl": {{ '/' | relative_url | jsonify }},
      "currentPath": {{ page.path | jsonify }},
      "statsUrl": {{ '/assets/data/guide-stats.json' | relative_url | jsonify }},
      "pages": [
        {% assign all_pages = site.pages | sort: 'path' %}
        {% assign first_guide = true %}
        {% for p in all_pages %}
        {% if p.path contains 'guide/' and p.path contains '.md' %}
        {% unless first_guide %},{% endunless %}
        {
          "path": {{ p.path | jsonify }},
          "url": {{ p.url | relative_url | jsonify }},
          "title": {{ p.title | default: p.name | replace: '.md', '' | jsonify }}
        }
        {% assign first_guide = false %}
        {% endif %}
        {% endfor %}
      ]
    }
  </script>
  <script src="{{ '/assets/js/guide-completion-config.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
