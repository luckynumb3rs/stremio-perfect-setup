name: Changelog Sync Check

on:
  pull_request:

jobs:
  verify-changelog-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate AIOStreams changelog output
        run: bash scripts/sync-changelog.sh
      - name: Verify no diff
        run: |
          if ! git diff --quiet -- templates/AIOStreams-Changelog.md; then
            echo "templates/AIOStreams-Changelog.md is out of sync. Run: bash scripts/sync-changelog.sh"
            git --no-pager diff -- templates/AIOStreams-Changelog.md
            exit 1
          fi
