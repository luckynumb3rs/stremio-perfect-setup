name: Home Sync Check

on:
  pull_request:

jobs:
  verify-home-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync homepage files
        run: bash scripts/prepare-site-source.sh --sync-readme
      - name: Verify no diff
        run: |
          if ! git diff --quiet -- README.md; then
            echo "README.md is out of sync. Run: bash scripts/prepare-site-source.sh --sync-readme"
            git --no-pager diff -- README.md
            exit 1
          fi
