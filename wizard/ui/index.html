<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🤖 Perfect Setup - One-Click Automation</title>
  <style>
    :root { --bg:#0e1116; --panel:#161b22; --border:#2a313c; --fg:#e6edf3; --muted:#9aa7b4; --accent:#6ea8fe; --warn:#e3b341; --ok:#3fb950; }
    * { box-sizing: border-box; }
    body { margin:0; font:15px/1.5 system-ui, sans-serif; background:var(--bg); color:var(--fg); }
    header { padding:24px 20px; border-bottom:1px solid var(--border); }
    header h1 { margin:0 0 4px; font-size:20px; }
    header p { margin:0; color:var(--muted); }
    main { max-width:760px; margin:0 auto; padding:20px; }
    .step { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin:0 0 18px; }
    .step h2 { margin:0 0 12px; font-size:16px; }
    .field { margin:14px 0; }
    .field[hidden] { display:none; }
    .field label { display:block; font-weight:600; margin-bottom:4px; }
    .field .desc { color:var(--muted); font-size:13px; margin:2px 0 8px; }
    .field input[type=text], .field input[type=number], .field input[type=email], .field input[type=password], .field select {
      width:100%; padding:9px 10px; background:#0d1117; color:var(--fg); border:1px solid var(--border); border-radius:8px;
    }
    .field--boolean { display:flex; align-items:center; gap:8px; }
    .field--boolean label { margin:0; order:2; }
    .multi-select { display:flex; flex-wrap:wrap; gap:8px; }
    .chip { display:inline-flex; align-items:center; gap:4px; padding:5px 10px; background:#0d1117; border:1px solid var(--border); border-radius:999px; font-weight:400; cursor:pointer; }
    .field--alert { background:#0d1117; border-left:3px solid var(--accent); padding:10px 14px; border-radius:6px; }
    .alert--warning { border-left-color:var(--warn); }
    button { background:var(--accent); color:#0b1020; border:0; padding:10px 18px; border-radius:8px; font-weight:700; cursor:pointer; }
    button.secondary { background:transparent; color:var(--fg); border:1px solid var(--border); }
    .services { display:flex; flex-wrap:wrap; gap:8px; }
    code { background:#0d1117; padding:1px 5px; border-radius:4px; }
    a { color:var(--accent); }
    .summary { white-space:pre-wrap; font-family:ui-monospace, monospace; font-size:13px; }
    .notice { color:var(--warn); }
  </style>
</head>
<body>
  <header>
    <h1>🤖 Stremio / Nuvio Perfect Setup - Automation</h1>
    <p>Create an account, build the addons from the guide templates, and install everything automatically.</p>
  </header>
  <main id="app">
    <div class="step"><h2>Loading…</h2><p class="desc">Fetching the AIOStreams template to build the form.</p></div>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
