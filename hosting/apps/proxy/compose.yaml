services:
  proxy:
    image: gcr.io/distroless/nodejs20-debian12:nonroot
    container_name: proxy
    restart: unless-stopped
    command: ["/app/server.js"]
    expose:
      - ${PORT:-8080}
    env_file:
      - .env
    volumes:
      - ./server.js:/app/server.js:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.proxy.rule=Host(`${PROXY_HOSTNAME?}`)"
      - "traefik.http.routers.proxy.entrypoints=websecure"
      - "traefik.http.routers.proxy.tls.certresolver=letsencrypt"
      - "traefik.http.services.proxy.loadbalancer.server.port=${PORT:-8080}"
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || '8080') + '/healthz').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 1m
      timeout: 10s
      retries: 5
      start_period: 10s
    profiles:
      - proxy
      - all
